<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightweight — Feature Graphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07070d;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .frame {
    width: 1024px;
    height: 500px;
    background: #07070d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  .lockup svg {
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(212, 118, 44, 0.6)) drop-shadow(0 0 18px rgba(212, 118, 44, 0.2));
  }
  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 5.2rem;
    letter-spacing: 0.06em;
    color: #d4762c;
    text-transform: uppercase;
    line-height: 1;
    text-box: trim-both cap alphabetic;
    text-shadow: 0 0 10px rgba(212, 118, 44, 0.6), 0 0 30px rgba(212, 118, 44, 0.15);
  }
  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 1.15rem;
    letter-spacing: 0.08em;
    color: #6a6a82;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── Debug panel ── */
  .debug {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(10, 10, 15, 0.96);
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #888;
    min-width: 300px;
    z-index: 100;
    user-select: none;
  }
  .debug h3 {
    color: #e8a832;
    font-size: 10px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .debug-row {
    display: flex;
    justify-content: space-between;
    padding: 1.5px 0;
  }
  .debug-row .l { color: #6a6a82; }
  .debug-row .v { color: #32c8e8; }
  .debug-row .ok { color: #32e868; }
  .debug-row .bad { color: #e83232; }
  .debug-hr { border-top: 1px solid #222; margin: 6px 0; }
  .debug-hint {
    margin-top: 10px;
    font-size: 9.5px;
    color: #444;
    line-height: 1.5;
  }

  /* ── Alignment guides (toggled by G key) ── */
  .show-guides .lockup::after {
    content: '';
    position: absolute;
    left: -20px;
    right: -20px;
    top: 50%;
    height: 1px;
    background: rgba(50, 200, 232, 0.35);
    pointer-events: none;
    z-index: 10;
  }
  .show-guides #mark {
    outline: 1px dashed rgba(232, 168, 50, 0.25);
  }
  .show-guides .wordmark {
    outline: 1px dashed rgba(232, 168, 50, 0.25);
  }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="lockup" id="lockup">
      <svg id="mark" viewBox="0 0 28 28" fill="none">
        <rect x="1.5" y="1.5" width="25" height="25" rx="1" stroke="#d4762c" stroke-width="2"/>
        <polygon points="1.5,1.5 26.5,8.2 8.2,26.5" stroke="#d4762c" stroke-width="2" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="wordmark" id="wordmark">LIGHTWEIGHT</span>
    </div>
    <div class="tagline">SIMPLE STRENGTH TRACKING</div>
  </div>

  <div class="debug" id="debug">
    <h3>Alignment Metrics</h3>
    <div id="metrics">Waiting for font…</div>
  </div>

  <script>
    // State: manual offset for fine-tuning
    let nudge = 0;          // px offset applied to SVG translateY
    let sizeNudge = 0;      // px offset applied to SVG size
    let showGuides = false;

    document.fonts.ready.then(() => {
      // Small delay to let text-box-trim settle
      requestAnimationFrame(() => requestAnimationFrame(sync));
    });

    document.addEventListener('keydown', (e) => {
      let changed = false;
      // Arrow Up/Down: nudge vertical position ±0.5px
      if (e.key === 'ArrowUp')   { nudge -= 0.5; changed = true; }
      if (e.key === 'ArrowDown') { nudge += 0.5; changed = true; }
      // +/-: nudge size ±0.5px
      if (e.key === '=' || e.key === '+') { sizeNudge += 0.5; changed = true; }
      if (e.key === '-')                  { sizeNudge -= 0.5; changed = true; }
      // R: reset nudges
      if (e.key === 'r' || e.key === 'R') { nudge = 0; sizeNudge = 0; changed = true; }
      // G: toggle guides
      if (e.key === 'g' || e.key === 'G') {
        showGuides = !showGuides;
        document.body.classList.toggle('show-guides', showGuides);
      }
      if (changed) { e.preventDefault(); sync(); }
    });

    function sync() {
      const wordmark = document.getElementById('wordmark');
      const mark = document.getElementById('mark');

      // ── Measure font metrics via canvas ──
      const computed = getComputedStyle(wordmark);
      const fontSize = parseFloat(computed.fontSize);

      const ctx = document.createElement('canvas').getContext('2d');
      ctx.font = `600 ${fontSize}px 'Barlow Condensed'`;
      const tm = ctx.measureText('LIGHTWEIGHT');
      const canvasAscent = tm.actualBoundingBoxAscent;
      const canvasDescent = tm.actualBoundingBoxDescent;
      const canvasCapH = canvasAscent + canvasDescent;

      // ── Measure DOM rendered height (after text-box-trim) ──
      const domH = wordmark.getBoundingClientRect().height;

      // ── Decide target height ──
      // Canvas cap-height is authoritative (measures actual ink bounds).
      // DOM height includes line-box space if text-box-trim isn't supported.
      const trimWorking = Math.abs(domH - canvasCapH) < 2;
      const baseH = trimWorking ? domH : canvasCapH;
      const targetH = baseH + sizeNudge;

      // ── Apply to SVG ──
      const sz = Math.round(targetH * 10) / 10;
      mark.style.width = sz + 'px';
      mark.style.height = sz + 'px';
      mark.style.transform = nudge !== 0 ? `translateY(${nudge}px)` : '';

      // ── Re-measure alignment after applying ──
      const wRect = wordmark.getBoundingClientRect();
      const mRect = mark.getBoundingClientRect();
      const wCenter = wRect.top + wRect.height / 2;
      const mCenter = mRect.top + mRect.height / 2;
      const yDelta = mCenter - wCenter;
      const hDelta = mRect.height - wRect.height;

      // ── Render debug ──
      const q = (v, thresh = 0.5) => Math.abs(v) <= thresh ? 'ok' : 'bad';
      const trimLabel = trimWorking ? '<span class="ok">yes</span>' : '<span class="bad">no → using canvas</span>';
      const srcLabel = trimWorking ? 'DOM (trimmed)' : 'canvas cap-H';
      document.getElementById('metrics').innerHTML = `
        <div class="debug-row"><span class="l">font-size</span><span class="v">${fontSize.toFixed(1)}px</span></div>
        <div class="debug-hr"></div>
        <div class="debug-row"><span class="l">canvas cap-height</span><span class="v">${canvasCapH.toFixed(2)}px</span></div>
        <div class="debug-row"><span class="l">DOM wordmark H</span><span class="v">${domH.toFixed(2)}px</span></div>
        <div class="debug-row"><span class="l">text-box-trim ok?</span>${trimLabel}</div>
        <div class="debug-row"><span class="l">DOM vs canvas Δ</span><span class="${q(domH - canvasCapH, 2)}">${(domH - canvasCapH) >= 0 ? '+' : ''}${(domH - canvasCapH).toFixed(2)}px</span></div>
        <div class="debug-hr"></div>
        <div class="debug-row"><span class="l">size source</span><span class="v">${srcLabel}</span></div>
        <div class="debug-row"><span class="l">base height</span><span class="v">${baseH.toFixed(2)}px</span></div>
        <div class="debug-row"><span class="l">SVG applied</span><span class="v">${sz.toFixed(1)}px</span></div>
        <div class="debug-hr"></div>
        <div class="debug-row"><span class="l">height Δ (svg−text)</span><span class="${q(hDelta)}">${hDelta >= 0 ? '+' : ''}${hDelta.toFixed(2)}px</span></div>
        <div class="debug-row"><span class="l">center Y Δ</span><span class="${q(yDelta)}">${yDelta >= 0 ? '+' : ''}${yDelta.toFixed(2)}px</span></div>
        <div class="debug-hr"></div>
        <div class="debug-row"><span class="l">size nudge</span><span class="v">${sizeNudge >= 0 ? '+' : ''}${sizeNudge.toFixed(1)}px</span></div>
        <div class="debug-row"><span class="l">Y nudge</span><span class="v">${nudge >= 0 ? '+' : ''}${nudge.toFixed(1)}px</span></div>
        <div class="debug-hint">
          ↑↓ nudge Y &nbsp;│&nbsp; +/- nudge size<br>
          G guides &nbsp;│&nbsp; R reset
        </div>
      `;
    }
  </script>

<script>
document.fonts.ready.then(() => {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const wordmark = document.getElementById('wordmark');
    const mark = document.getElementById('mark');
    const computed = getComputedStyle(wordmark);
    const fontSize = parseFloat(computed.fontSize);

    const ctx = document.createElement('canvas').getContext('2d');
    ctx.font = `600 ${fontSize}px 'Barlow Condensed'`;
    const tm = ctx.measureText('LIGHTWEIGHT');
    const canvasAscent = tm.actualBoundingBoxAscent;
    const canvasDescent = tm.actualBoundingBoxDescent;
    const canvasCapH = canvasAscent + canvasDescent;

    const wRect = wordmark.getBoundingClientRect();
    const mRect = mark.getBoundingClientRect();
    const domH = wRect.height;
    const trimWorking = Math.abs(domH - canvasCapH) < 2;
    const wCenter = wRect.top + wRect.height / 2;
    const mCenter = mRect.top + mRect.height / 2;

    console.log('METRICS_JSON:' + JSON.stringify({
      fontSize: +fontSize.toFixed(2),
      canvasAscent: +canvasAscent.toFixed(2),
      canvasDescent: +canvasDescent.toFixed(2),
      canvasCapH: +canvasCapH.toFixed(2),
      domWordmarkH: +domH.toFixed(2),
      domMarkH: +mRect.height.toFixed(2),
      domMarkW: +mRect.width.toFixed(2),
      trimWorking,
      domVsCanvasDelta: +(domH - canvasCapH).toFixed(2),
      heightDelta: +(mRect.height - wRect.height).toFixed(2),
      centerYDelta: +(mCenter - wCenter).toFixed(2),
      wordmarkTop: +wRect.top.toFixed(2),
      wordmarkBottom: +wRect.bottom.toFixed(2),
      markTop: +mRect.top.toFixed(2),
      markBottom: +mRect.bottom.toFixed(2),
    }));
  }));
});
</script>
</body>
</html>
